{% extends 'base.html' %}
{% block title %}Record Attendance — ANC Portal{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-3">
    <a href="{% url 'appointment_list' %}" class="btn btn-sm btn-outline-secondary me-3"><i
            class="bi bi-arrow-left"></i></a>
    <h4 class="fw-bold mb-0">Record Attendance</h4>
</div>
<div class="card" style="max-width:500px">
    <div class="card-header">Appointment Details</div>
    <div class="card-body">
        <p><strong>Patient:</strong> {{ appointment.patient.name }}</p>
        <p><strong>Date:</strong> {{ appointment.appointment_date|date:"M d, Y H:i" }}</p>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Attendance Status</label>
                <select name="status" class="form-control" required>
                    <option value="">— Select —</option>
                    <option value="Attended">Attended</option>
                    <option value="Missed">Missed</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Notes (optional)</label>
                <textarea name="notes" class="form-control" rows="3" placeholder="Any notes..."></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-clipboard-check"></i> Save</button>
                <a href="{% url 'appointment_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
